services:
  postgres:
    image: postgres:16
    container_name: ai-email-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_email_app
    ports:
      - "5432:5432"
    volumes:
      - ai_email_postgres_data:/var/lib/postgresql/data

volumes:
  ai_email_postgres_data:
