name: Build Home Assistant Add-on Images

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/home-assistant-addon-image.yml"
      - "Dockerfile"
      - "home-assistant-addon/**"
      - "package.json"
      - "package-lock.json"
      - "prisma/**"
      - "server/**"
      - "src/**"
      - "index.html"
      - "vite.config.*"
      - "tsconfig*.json"
      - "tailwind.config.*"
      - "postcss.config.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.addon_arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - addon_arch: amd64
            platform: linux/amd64
          - addon_arch: aarch64
            platform: linux/arm64
          - addon_arch: armv7
            platform: linux/arm/v7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          VERSION="$(awk -F'"' '/^version:/ { print $2 }' home-assistant-addon/config.yaml)"
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "image=ghcr.io/${OWNER}/emailable-${{ matrix.addon_arch }}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./home-assistant-addon
          file: ./home-assistant-addon/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            APP_CACHE_BUST=${{ github.sha }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
