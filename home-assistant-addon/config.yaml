name: Emailable
version: "0.1.69"
slug: emailable
description: Email labeling assistant with API and MCP tools.
url: "https://github.com/montaque22/AI-Email-Labeling-App"
image: "ghcr.io/montaque22/emailable-{arch}"
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
init: false
ingress: true
ingress_port: 3000
panel_icon: mdi:email-edit-outline
panel_title: Emailable
panel_admin: false
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: Direct web/API access. Change the host port in Network settings without changing the internal ingress port.
map:
  - addon_config:rw
options:
  basic:
    app_url: ""
    google_client_id: ""
    google_client_secret: ""
  optional:
    better_auth_url: ""
    better_auth_secret: ""
    database_url: ""
    yahoo_client_id: ""
    yahoo_client_secret: ""
    microsoft_client_id: ""
    microsoft_client_secret: ""
    node_env: production
schema:
  basic:
    app_url: str?
    google_client_id: str?
    google_client_secret: password?
  optional:
    better_auth_url: str?
    better_auth_secret: password?
    database_url: password?
    yahoo_client_id: str?
    yahoo_client_secret: password?
    microsoft_client_id: str?
    microsoft_client_secret: password?
    node_env: list(production|development)
